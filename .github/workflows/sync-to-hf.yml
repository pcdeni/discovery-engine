# After a PR merges, push new extraction results to HuggingFace dataset.
# Also auto-updates processed_papers.jsonl so contributors don't re-process.

name: Sync to HuggingFace

on:
  push:
    branches: [main]
    paths:
      - 'submissions/**'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[hf]"

      - name: Find new submission files
        id: files
        run: |
          files=$(find submissions/ -name '*.json' -type f 2>/dev/null || true)
          count=$(echo "$files" | grep -c '.json' || echo 0)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Found $count file(s) to sync"

      - name: Push to HuggingFace
        if: steps.files.outputs.count > 0
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import json, os
          from pathlib import Path
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = 'discovery-engine/results'

          submissions = list(Path('submissions').glob('*.json'))
          print(f'Uploading {len(submissions)} file(s) to {repo_id}')

          for f in submissions:
              data = json.loads(f.read_text())
              paper_id = data.get('_meta', {}).get('paper_id', f.stem)
              api.upload_file(
                  path_or_fileobj=str(f),
                  path_in_repo=f'results/{f.name}',
                  repo_id=repo_id,
                  repo_type='dataset',
                  commit_message=f'Add extraction: {paper_id}',
              )
              print(f'  Uploaded: {f.name} -> {paper_id}')

          print('HuggingFace sync complete.')
          "

      - name: Update processed_papers.jsonl
        if: steps.files.outputs.count > 0
        run: |
          python -c "
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          # Read existing processed papers
          tracking_file = Path('processed_papers.jsonl')
          existing_ids = set()
          if tracking_file.exists():
              for line in tracking_file.read_text().strip().split('\n'):
                  if line.strip():
                      try:
                          entry = json.loads(line)
                          existing_ids.add(entry.get('paper_id', ''))
                      except json.JSONDecodeError:
                          pass

          # Add new paper IDs from submissions
          new_entries = []
          for f in sorted(Path('submissions').glob('*.json')):
              data = json.loads(f.read_text())
              meta = data.get('_meta', {})
              paper_id = meta.get('paper_id', f.stem)

              if paper_id not in existing_ids:
                  new_entries.append({
                      'paper_id': paper_id,
                      'source': meta.get('source', 'unknown'),
                      'extracted_by': meta.get('extracted_by', 'unknown'),
                      'merged_at': datetime.now(timezone.utc).isoformat(),
                  })

          if new_entries:
              with open(tracking_file, 'a', encoding='utf-8') as f:
                  for entry in new_entries:
                      f.write(json.dumps(entry, ensure_ascii=False) + '\n')
              print(f'Added {len(new_entries)} paper(s) to processed_papers.jsonl')
          else:
              print('No new papers to add to tracking file')
          "

      - name: Clean up and commit
        if: steps.files.outputs.count > 0
        run: |
          # Remove synced submission files
          find submissions/ -name '*.json' -type f -delete

          # Commit tracking update + cleanup
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_papers.jsonl submissions/
          git diff --staged --quiet || git commit -m "Sync: update tracking + clean submissions"
          git push
