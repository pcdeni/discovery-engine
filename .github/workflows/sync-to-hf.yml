# After a PR merges, push new extraction results to HuggingFace dataset.
# Cleans up submissions/ directory after successful push.

name: Sync to HuggingFace

on:
  push:
    branches: [main]
    paths:
      - 'submissions/**'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history for diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[hf]"

      - name: Find new submission files
        id: files
        run: |
          # Find JSON files in submissions/
          files=$(find submissions/ -name '*.json' -type f 2>/dev/null || true)
          count=$(echo "$files" | grep -c '.json' || echo 0)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Found $count file(s) to sync"

      - name: Push to HuggingFace
        if: steps.files.outputs.count > 0
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import json, os
          from pathlib import Path
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = 'discovery-engine/results'

          submissions = list(Path('submissions').glob('*.json'))
          print(f'Uploading {len(submissions)} file(s) to {repo_id}')

          for f in submissions:
              data = json.loads(f.read_text())
              paper_id = data.get('_meta', {}).get('paper_id', f.stem)
              # Upload to results/ directory in the HF dataset
              api.upload_file(
                  path_or_fileobj=str(f),
                  path_in_repo=f'results/{f.name}',
                  repo_id=repo_id,
                  repo_type='dataset',
                  commit_message=f'Add extraction: {paper_id}',
              )
              print(f'  Uploaded: {f.name} -> {paper_id}')

          print('Sync complete.')
          "

      - name: Clean up submissions
        if: steps.files.outputs.count > 0
        run: |
          # Remove synced files from submissions/
          find submissions/ -name '*.json' -type f -delete
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add submissions/
          git diff --staged --quiet || git commit -m "Clean up synced submissions"
          git push

      - name: Update stats
        if: steps.files.outputs.count > 0
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          from huggingface_hub import HfApi

          # Count total results
          api = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = 'discovery-engine/results'

          try:
              files = api.list_repo_files(repo_id=repo_id, repo_type='dataset')
              result_count = sum(1 for f in files if f.startswith('results/') and f.endswith('.json'))
          except Exception:
              result_count = 0

          stats = {
              'total_papers': result_count,
              'last_updated': datetime.now(timezone.utc).isoformat(),
          }
          print(json.dumps(stats, indent=2))
          "
