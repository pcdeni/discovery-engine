# Weekly cron: discover new papers from scientific databases.
# Queries arXiv, PubMed, OpenAlex, OSTI for papers added in the last week.
# Appends new paper IDs to the paper_index on HuggingFace.

name: Update Paper Index

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 2 AM UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  update-index:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[hf]"

      - name: Run paper index update
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/update_paper_index.py

      - name: Log results
        run: echo "Paper index update complete. Check HuggingFace for updated index."
